<!DOCTYPE html>
<html>
<head>
    <title>EmpTrack Backend Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>EmpTrack Backend Test</h1>
    
    <button onclick="testHealth()">Test Health</button>
    <button onclick="testLogin()">Test Login</button>
    
    <div id="result"></div>

    <script>
        async function testHealth() {
            try {
                const response = await fetch('https://prodigy-fs-02-us1x.onrender.com/api/health');
                const data = await response.json();
                document.getElementById('result').innerHTML = '<div class="result">Health: ' + JSON.stringify(data) + '</div>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<div class="result">Health Error: ' + error.message + '</div>';
            }
        }

        async function testLogin() {
            try {
                const response = await fetch('https://prodigy-fs-02-us1x.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@emptrack.com',
                        password: 'admin123'
                    })
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = '<div class="result">Login: ' + JSON.stringify(data) + '</div>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<div class="result">Login Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
