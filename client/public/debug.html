<!DOCTYPE html>
<html>
<head>
    <title>EmpTrack Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .error { color: red; background: #ffe6e6; padding: 10px; margin: 10px 0; }
        .success { color: green; background: #e6ffe6; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>EmpTrack Debug Page</h1>
    <div id="debug-info"></div>
    
    <h2>Test Login Directly</h2>
    <button onclick="testLogin()">Test Login</button>
    <div id="login-result"></div>
    
    <h2>Links</h2>
    <a href="/Prodigy_FS_02/">Main App</a><br>
    <a href="/Prodigy_FS_02/index-working.html">Working Version</a>

    <script>
        // Show debug info
        const debugInfo = document.getElementById('debug-info');
        debugInfo.innerHTML = `
            <div class="success">Page loaded successfully</div>
            <div>URL: ${window.location.href}</div>
            <div>User Agent: ${navigator.userAgent}</div>
            <div>Time: ${new Date().toLocaleString()}</div>
        `;
        
        // Test login
        async function testLogin() {
            const resultDiv = document.getElementById('login-result');
            resultDiv.innerHTML = 'Testing login...';
            
            try {
                const response = await fetch('https://prodigy-fs-02-us1x.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@emptrack.com',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<div class="success">Login Success: ${JSON.stringify(data)}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">Login Failed: ${JSON.stringify(data)}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Network Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
