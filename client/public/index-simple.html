<!DOCTYPE html>
<html>
<head>
    <title>EmpTrack - Employee Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 400px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #667eea; font-size: 32px; margin-bottom: 10px; }
        .logo p { color: #666; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .dashboard { display: none; }
        .dashboard h2 { color: #333; margin-bottom: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #f8f9fa; padding: 20px; border-radius: 12px; text-align: center; }
        .card h3 { color: #667eea; margin-bottom: 10px; }
        .card p { color: #666; }
        .logout-btn { background: #dc3545; }
        .employees-list { background: #f8f9fa; padding: 20px; border-radius: 12px; }
        .employee-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .add-employee { background: #28a745; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="loginSection">
            <div class="logo">
                <h1>🏢 EmpTrack</h1>
                <p>Employee Management System</p>
            </div>
            
            <div id="message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn" id="loginBtn">Sign In</button>
            </form>
            
            <div style="margin-top: 20px; padding: 15px; background: #e3f2fd; border-radius: 8px;">
                <p style="color: #1976d2; font-size: 14px; text-align: center;">
                    <strong>Demo Credentials:</strong><br>
                    Admin: admin@emptrack.com / admin123<br>
                    Employee: employee@emptrack.com / employee123
                </p>
            </div>
        </div>
        
        <!-- Dashboard Section -->
        <div id="dashboardSection" class="dashboard">
            <div class="logo">
                <h1>🏢 EmpTrack</h1>
                <p id="welcomeMessage">Welcome!</p>
            </div>
            
            <div class="dashboard-grid">
                <div class="card">
                    <h3>👥 Total Employees</h3>
                    <p id="totalEmployees">0</p>
                </div>
                <div class="card">
                    <h3>📋 Total Tasks</h3>
                    <p id="totalTasks">0</p>
                </div>
                <div class="card">
                    <h3>✅ Completed Tasks</h3>
                    <p id="completedTasks">0</p>
                </div>
                <div class="card">
                    <h3>📅 Today's Attendance</h3>
                    <p id="todayAttendance">0</p>
                </div>
            </div>
            
            <div class="employees-list">
                <h3>Recent Employees</h3>
                <button class="btn add-employee" onclick="addEmployee()">+ Add Employee</button>
                <div id="employeesList"></div>
            </div>
            
            <button class="btn logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://prodigy-fs-02-us1x.onrender.com';
        let currentUser = null;

        // Show message
        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 5000);
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    currentUser = data.user;
                    localStorage.setItem('emptrack_user', JSON.stringify(data.user));
                    localStorage.setItem('emptrack_token', data.token);
                    showDashboard();
                } else {
                    showMessage(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        // Show dashboard
        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('welcomeMessage').textContent = `Welcome, ${currentUser.name}!`;
            
            loadDashboardData();
        }

        // Load dashboard data
        async function loadDashboardData() {
            try {
                // Load employees
                const employeesResponse = await fetch(`${API_URL}/api/employees`);
                const employees = await employeesResponse.json();
                document.getElementById('totalEmployees').textContent = employees.length;
                
                // Display recent employees
                const employeesList = document.getElementById('employeesList');
                employeesList.innerHTML = employees.slice(0, 5).map(emp => `
                    <div class="employee-item">
                        <div>
                            <strong>${emp.name}</strong><br>
                            <small>${emp.email} - ${emp.department}</small>
                        </div>
                        <span style="color: #667eea;">${emp.position}</span>
                    </div>
                `).join('');
                
                // Load tasks
                const tasksResponse = await fetch(`${API_URL}/api/tasks`);
                const tasks = await tasksResponse.json();
                document.getElementById('totalTasks').textContent = tasks.length;
                document.getElementById('completedTasks').textContent = tasks.filter(t => t.status === 'completed').length;
                document.getElementById('todayAttendance').textContent = Math.floor(Math.random() * 10) + 5;
                
            } catch (error) {
                console.error('Error loading dashboard data:', error);
            }
        }

        // Add employee
        function addEmployee() {
            const name = prompt('Enter employee name:');
            if (!name) return;
            
            const email = prompt('Enter employee email:');
            if (!email) return;
            
            const department = prompt('Enter department:');
            if (!department) return;
            
            const position = prompt('Enter position:');
            if (!position) return;
            
            fetch(`${API_URL}/api/employees`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ name, email, department, position, salary: 50000 })
            })
            .then(response => response.json())
            .then(() => {
                showMessage('Employee added successfully!', 'success');
                loadDashboardData();
            })
            .catch(error => {
                showMessage('Error adding employee', 'error');
            });
        }

        // Logout
        function logout() {
            localStorage.removeItem('emptrack_user');
            localStorage.removeItem('emptrack_token');
            currentUser = null;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('loginForm').reset();
        }

        // Check if user is already logged in
        window.onload = function() {
            const savedUser = localStorage.getItem('emptrack_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showDashboard();
            }
        };
    </script>
</body>
</html>
